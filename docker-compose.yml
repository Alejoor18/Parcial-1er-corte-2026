version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-gafas
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gafasdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gafasdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: gafas-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      JWT_SECRET: clave-super-segura-de-minimo-32-caracteres-123456
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/gafasdb
      SPRING_R2DBC_USERNAME: postgres
      SPRING_R2DBC_PASSWORD: postgres
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata: